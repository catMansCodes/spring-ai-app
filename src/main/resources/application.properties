spring.application.name=spring-ai-app

#Ollma setup - mistral is default model, you can change it to any model you have in ollama pulled on local machine
spring.ollama.url=http://localhost:11434
spring.ollama.model=mistral

# OpenAI setup - make sure to set the OPENAI_API_KEY environment variable with your API key
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4-0613

# Google Gemini setup - make sure to set the GOOGLE_GEMINI_API_KEY environment variable with your API key
spring.ai.google.genai.api-key=${GOOGLE_GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3-flash-preview

